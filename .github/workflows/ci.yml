name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    name: Lint Test Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Bundle Budget
        run: npm run check:bundle

      - name: Check Migrations
        run: npm run check:migrations

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: quality
    env:
      # Placeholder values are sufficient for UI smoke tests; real values come from runtime secrets.
      VITE_SUPABASE_URL: https://test-project.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e
